{% extends "base.html" %}

{% block title %}Active Member{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-sm">
            <div class="card-header bg-success text-white">
                <h4 class="mb-0">Active Member</h4>
            </div>
            <div class="card-body text-center py-5">
                <i class="bi bi-check-circle-fill display-1 text-success mb-3"></i>
                <h3>Welcome to CheonTec SACCO!</h3>
                <p class="lead">You are already an active member of our SACCO.</p>
                
                {% if message %}
                <div class="alert alert-success">{{ message }}</div>
                {% endif %}
                
                <div class="row mt-4">
                    <div class="col-md-6">
                        <div class="card">
                            <div class="card-body">
                                <i class="bi bi-piggy-bank fs-1 text-primary"></i>
                                <h5>Savings</h5>
                                <a href="/member/savings" class="btn btn-sm btn-outline-primary">View Savings</a>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="card">
                            <div class="card-body">
                                <i class="bi bi-shield-check fs-1 text-primary"></i>
                                <h5>Shares</h5>
                                <a href="/shares/dashboard" class="btn btn-sm btn-outline-primary">View Shares</a>
                            </div>
                        </div>
                    </div>
                </div>
                
                <a href="/member/dashboard" class="btn btn-primary mt-4">Go to Dashboard</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
