{% extends "base.html" %}
{% block title %}Reports - Admin{% endblock %}
{% block content %}
<div class="card">
  <div class="card-body">
    <h4 class="card-title">Financial Reports</h4>
    <div class="row">
      <div class="col-md-4">
        <div class="alert alert-primary">
          <h5>Net Savings</h5>
          <p class="fs-4">{{ report.net_savings }}</p>
        </div>
      </div>
      <div class="col-md-4">
        <div class="alert alert-info">
          <h5>Total Loans</h5>
          <p class="fs-4">{{ report.total_loans }}</p>
        </div>
      </div>
      <div class="col-md-4">
        <div class="alert alert-warning">
          <h5>Outstanding (approved)</h5>
          <p class="fs-4">{{ report.outstanding_loans }}</p>
        </div>
      </div>
    </div>
  </div>
</div>

<p class="mt-3"><a class="btn btn-link" href="/admin/dashboard">Back to dashboard</a></p>
{% endblock %}
